[project]
site_name = "Utility Hub"
site_description = "Your all-in-one toolkit for everyday development"
repo_name = "HYP3R00T/UtilityHub"
repo_url = "https://github.com/HYP3R00T/UtilityHub"
site_author = "Rajesh Das"
copyright = """
Copyright &copy; 2026 Rajesh Das
"""

nav = [
    { Home = "index.md" },
    { "utilityhub_config" = [
        { "Overview" = "packages/utilityhub_config/index.md" },
        { "Getting Started" = "packages/utilityhub_config/getting-started.md" },
        { "Core Concepts" = [
            { "Overview" = "packages/utilityhub_config/concepts/index.md" },
            { "Precedence Order" = "packages/utilityhub_config/concepts/precedence.md" },
            { "Metadata Tracking" = "packages/utilityhub_config/concepts/metadata.md" },
        ] },
        { "Usage Guides" = [
            { "Overview" = "packages/utilityhub_config/guides/index.md" },
            { "Basic Usage" = "packages/utilityhub_config/guides/basic-usage.md" },
            { "Configuration Files" = "packages/utilityhub_config/guides/configuration-files.md" },
            { "Config Paths" = "packages/utilityhub_config/guides/config-paths.md" },
            { "Environment Variables" = "packages/utilityhub_config/guides/environment-variables.md" },
            { "Explicit Config Files" = "packages/utilityhub_config/guides/explicit-config-files.md" },
            { "Path Expansion" = "packages/utilityhub_config/guides/path-expansion.md" },
            { "Runtime Overrides" = "packages/utilityhub_config/guides/runtime-overrides.md" },
            { "Nested Models" = "packages/utilityhub_config/guides/nested-models.md" },
            { "Extension Schemas" = "packages/utilityhub_config/guides/extension-schemas.md" },
            { "Metadata Tracking" = "packages/utilityhub_config/guides/metadata-tracking.md" },
            { "Error Handling" = "packages/utilityhub_config/guides/error-handling.md" },
        ] },
        { "Examples" = "packages/utilityhub_config/examples.md" },
    ] },
    { "utilityhub_logging" = [
        { "Overview" = "packages/utilityhub_logging/index.md" },
        { "Getting Started" = "packages/utilityhub_logging/getting-started.md" },
        { "Usage Guides" = [
            { "Overview" = "packages/utilityhub_logging/guides/index.md" },
            { "Basic Usage" = "packages/utilityhub_logging/guides/basic-usage.md" },
            { "App Logging Configuration" = "packages/utilityhub_logging/guides/app-logging-configuration.md" },
            { "Log Paths" = "packages/utilityhub_logging/guides/log-paths.md" },
            { "Scoped Logging" = "packages/utilityhub_logging/guides/scoped-logging.md" },
            { "Structured Logging" = "packages/utilityhub_logging/guides/structured-logging.md" },
            { "Context Binding" = "packages/utilityhub_logging/guides/context-binding.md" },
        ] },
        { "Examples" = "packages/utilityhub_logging/examples.md" },
    ] },
]

[project.theme]
language = "en"
features = [
    "announce.dismiss",
    "content.action.edit",
    "content.action.view",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.path",
    "navigation.tabs",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.theme.icon]
logo = "lucide/monitor-cog"
next = "lucide/arrow-right"
previous = "lucide/arrow-left"
search = "lucide/search"
top = "lucide/arrow-up"
edit = "lucide/file-pen-line"
view = "lucide/file-braces-corner"

[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
    { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.plugins.mkdocstrings.handlers.python]
inventories = ["https://docs.python.org/3/objects.inv"]
paths = [
    "src",
    "packages/corridorkey/src",
    "packages/corridorkey-core/src",
    "packages/corridorkey-cli/src",
]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
inherited_members = true
show_source = false
merge_init_into_class = true
